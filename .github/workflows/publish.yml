name: Publish to npm

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0, v1.0.0, etc.

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
      id-token: write   # needed for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check before publish
        run: pnpm --filter @frappe-next/core exec tsc --noEmit

      - name: Publish @frappe-next/core
        run: pnpm --filter @frappe-next/core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
